name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install all dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git python3-dev zlib1g-dev openjdk-17-jdk unzip wget

      - name: Install Aidl via Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          rm commandlinetools-linux-11076708_latest.zip
          export PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin
          echo "y" | sdkmanager --licenses
          sdkmanager "build-tools;33.0.0"
          echo "export PATH=\$PATH:$HOME/android-sdk/cmdline-tools/latest/bin" >> ~/.bashrc
          which aidl || echo "Aidl installed via SDK"

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: auditor-app
          path: bin/*.apk
