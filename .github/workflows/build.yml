name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git zlib1g-dev openjdk-17-jdk
          pip install buildozer cython
      - name: Compilar APK
        run: buildozer android debug
      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: auditor-app
          path: bin/*.apk
