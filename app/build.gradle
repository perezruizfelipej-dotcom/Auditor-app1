plugins {
    id 'com.android.application'
}

android {
    namespace 'com.auditor.app'
    compileSdk 30

    defaultConfig {
        applicationId 'com.auditor.app'
        minSdk 21
        targetSdk 30
        versionCode 1
        versionName '1.0'
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'org.kivy:kivy:2.1.0'
}
